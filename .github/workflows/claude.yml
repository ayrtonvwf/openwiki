name: Claude

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

# Only run when someone actually tags @claude or @claude-opus, to avoid spending on every comment.
# @claude-opus contains the substring @claude, so the Sonnet job's gate must explicitly
# exclude @claude-opus on every surface, otherwise both jobs would fire on an Opus mention.
#
# SECURITY: every gate is additionally locked to `github.actor == github.repository_owner`
# so ONLY the repo owner's comments can trigger a run. Without this, any user the action's own
# permission check lets through (anyone with write/collaborator access) could spend tokens by
# tagging @claude. github.actor is the account that triggered the event and cannot be spoofed
# in the comment body, and repository_owner is the account (or org) that owns the repo, so this
# is the real author gate — keep it on every job.
jobs:
  claude:
    if: |
      github.actor == github.repository_owner && (
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') && !contains(github.event.comment.body, '@claude-opus')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude') && !contains(github.event.comment.body, '@claude-opus')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude') && !contains(github.event.review.body, '@claude-opus')) ||
      (github.event_name == 'issues' && ((contains(github.event.issue.body, '@claude') && !contains(github.event.issue.body, '@claude-opus')) || (contains(github.event.issue.title, '@claude') && !contains(github.event.issue.title, '@claude-opus')))))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Allow reading CI results on PRs
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Pre-install deps so Claude can validate its own changes offline.
      # Without this the sandbox has no node_modules and can't run pnpm install
      # non-interactively, so every @claude PR ships unvalidated (relying on checks.yml).
      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The openspec CLI (used by the /opsx:* commands and skills, per CLAUDE.md's
      # required OpenSpec workflow) lives in node_modules/.bin and is invoked as a
      # bare `openspec` command by those skills. Put it on PATH for the rest of
      # the job so the Bash tool can actually find and run it.
      - name: Add local CLI tools to PATH
        run: echo "$PWD/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # The action runs its OWN trigger-phrase check on the comment body, separate
          # from the job `if:` above. It defaults to @claude and matches on word
          # boundaries, so it correctly ignores @claude-opus (handled by the opus job).
          trigger_phrase: "@claude"
          # The action has NO `model:` input — the model MUST be passed via claude_args
          # as `--model`, otherwise it is silently ignored (only a warning) and the
          # default model runs.
          # Give Claude the project's real toolchain so it can validate AND fix its own
          # changes without hitting an approval prompt (CI has no interactive approver).
          # Use ":*" prefix wildcards so both bare and argument forms match — the previous
          # exact-match list rejected `pnpm install --no-frozen-lockfile`, the write-mode
          # `format`/`lint --fix` scripts, `pnpm run test`, the openspec CLI, and gh edits,
          # forcing every @claude PR to ship unformatted and unvalidated.
          # lint-staged (run by the husky pre-commit hook on every `git commit`) spawns
          # `prettier --write` and `eslint --fix` directly rather than via a pnpm script,
          # so those binaries need their own entries or the hook's own fixers get blocked
          # inside the commit and Claude is left with a still-failing hook to work around.
          # NOTE: allowlist mirrored in the claude-opus job below — keep both identical.
          claude_args: |
            --model claude-sonnet-5 --allowedTools "Bash(pnpm install:*),Bash(pnpm run format:*),Bash(pnpm run lint:*),Bash(pnpm run typecheck:*),Bash(pnpm run build:*),Bash(pnpm run coverage:*),Bash(pnpm test:*),Bash(pnpm run test:*),Bash(pnpm exec lint-staged:*),Bash(pnpm exec prettier:*),Bash(pnpm exec eslint:*),Bash(npx prettier:*),Bash(npx eslint:*),Bash(prettier:*),Bash(eslint:*),Bash(openspec:*),Bash(pnpm openspec:*),Bash(pnpm run openspec:*),Bash(npx openspec:*),Bash(mkdir:*),Bash(mv:*),Bash(gh pr create:*),Bash(gh pr edit:*),Bash(gh pr comment:*),Bash(gh pr view:*)"

      # The husky pre-commit hook runs lint-staged inside Claude's sandboxed Bash tool,
      # which can require an approval Claude has no one to grant, so its prettier/eslint
      # fixers silently no-op and commits land unformatted (see PR #16). This step is the
      # real backstop: it runs as a plain CI step (not sandboxed), reformats whatever
      # Claude ended up committing, and pushes a fixup commit if anything changed. Skipped
      # on the default branch so a @claude mention on main/an issue can never auto-push.
      # NOTE: mirrored in the claude-opus job below — keep both identical.
      - name: Format and push any remaining changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          current_branch=$(git rev-parse --abbrev-ref HEAD)
          if [ "$current_branch" = "${{ github.event.repository.default_branch }}" ]; then
            echo "On default branch, skipping auto-format-and-push."
            exit 0
          fi
          pnpm run format
          pnpm run lint || true
          if git diff --quiet; then
            echo "No formatting changes needed."
          else
            git config user.name "claude[bot]"
            git config user.email "41898282+claude[bot]@users.noreply.github.com"
            git add -A
            git commit -m "style: auto-format via CI"
            git push "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" "HEAD:$current_branch"
          fi

  claude-opus:
    if: |
      github.actor == github.repository_owner && (
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude-opus')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude-opus')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude-opus')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude-opus') || contains(github.event.issue.title, '@claude-opus'))))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Allow reading CI results on PRs
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Pre-install deps so Claude can validate its own changes offline.
      # Without this the sandbox has no node_modules and can't run pnpm install
      # non-interactively, so every @claude-opus PR ships unvalidated (relying on checks.yml).
      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The openspec CLI (used by the /opsx:* commands and skills, per CLAUDE.md's
      # required OpenSpec workflow) lives in node_modules/.bin and is invoked as a
      # bare `openspec` command by those skills. Put it on PATH for the rest of
      # the job so the Bash tool can actually find and run it.
      - name: Add local CLI tools to PATH
        run: echo "$PWD/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # REQUIRED: the action re-checks the comment body against this phrase (separate
          # from the job `if:`), defaulting to @claude. Without this override it finds no
          # @claude word-boundary match in "@claude-opus" and no-ops after setup.
          trigger_phrase: "@claude-opus"
          # The action has NO `model:` input — the model MUST be passed via claude_args
          # as `--model`, otherwise it is silently ignored (only a warning) and the
          # default model runs.
          # Give Claude the project's real toolchain so it can validate AND fix its own
          # changes without hitting an approval prompt (CI has no interactive approver).
          # Use ":*" prefix wildcards so both bare and argument forms match — the previous
          # exact-match list rejected `pnpm install --no-frozen-lockfile`, the write-mode
          # `format`/`lint --fix` scripts, `pnpm run test`, the openspec CLI, and gh edits,
          # forcing every @claude-opus PR to ship unformatted and unvalidated.
          # lint-staged (run by the husky pre-commit hook on every `git commit`) spawns
          # `prettier --write` and `eslint --fix` directly rather than via a pnpm script,
          # so those binaries need their own entries or the hook's own fixers get blocked
          # inside the commit and Claude is left with a still-failing hook to work around.
          # NOTE: allowlist mirrored in the claude job above — keep both identical.
          claude_args: |
            --model claude-opus-4-8 --allowedTools "Bash(pnpm install:*),Bash(pnpm run format:*),Bash(pnpm run lint:*),Bash(pnpm run typecheck:*),Bash(pnpm run build:*),Bash(pnpm run coverage:*),Bash(pnpm test:*),Bash(pnpm run test:*),Bash(pnpm exec lint-staged:*),Bash(pnpm exec prettier:*),Bash(pnpm exec eslint:*),Bash(npx prettier:*),Bash(npx eslint:*),Bash(prettier:*),Bash(eslint:*),Bash(openspec:*),Bash(pnpm openspec:*),Bash(pnpm run openspec:*),Bash(npx openspec:*),Bash(mkdir:*),Bash(mv:*),Bash(gh pr create:*),Bash(gh pr edit:*),Bash(gh pr comment:*),Bash(gh pr view:*)"

      # The husky pre-commit hook runs lint-staged inside Claude's sandboxed Bash tool,
      # which can require an approval Claude has no one to grant, so its prettier/eslint
      # fixers silently no-op and commits land unformatted (see PR #16). This step is the
      # real backstop: it runs as a plain CI step (not sandboxed), reformats whatever
      # Claude ended up committing, and pushes a fixup commit if anything changed. Skipped
      # on the default branch so a @claude mention on main/an issue can never auto-push.
      # NOTE: mirrored in the claude job above — keep both identical.
      - name: Format and push any remaining changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          current_branch=$(git rev-parse --abbrev-ref HEAD)
          if [ "$current_branch" = "${{ github.event.repository.default_branch }}" ]; then
            echo "On default branch, skipping auto-format-and-push."
            exit 0
          fi
          pnpm run format
          pnpm run lint || true
          if git diff --quiet; then
            echo "No formatting changes needed."
          else
            git config user.name "claude[bot]"
            git config user.email "41898282+claude[bot]@users.noreply.github.com"
            git add -A
            git commit -m "style: auto-format via CI"
            git push "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" "HEAD:$current_branch"
          fi
